rule_id: facility_temperature_spike
description: Emit when a facility temperature reading exceeds the threshold
trigger:
  type: event
sources:
  - sensor_type: facility_temperature
    entity_id: "*"
condition:
  operator: AND
  operands:
    - metric: value
      operator: gt
      value: 85
actions:
  - severity: critical
    message: "High facility temperature for {{entity_id}}: {{value}}"
    sinks:
      - type: stdout
